<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basket Blitz</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    color: white;
    touch-action: none;
}

.game {
    position: relative;
    width: 100%;
    max-width: 400px;
    height: 600px;
    background: #222;
    overflow: hidden;
    border: 2px solid white;
}

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 5;
}

.basket {
    position: absolute;
    bottom: 20px;
    font-size: 40px;
}

.ball {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
}

.green { background: limegreen; }
.red { background: red; }

#gameOver {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

input, button {
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

    <div id="hud">
        <div id="lives">❤️❤️❤️❤️❤️</div>
        <div id="score">Score: 0</div>
        <div style="margin-top:6px; font-size:14px; color:lime; font-weight:bold;">
            🎯 Catch ONLY the GREEN balls!
        </div>
    </div>

    <div class="basket" id="basket">🧺</div>

    <div id="gameOver">
        <h1>Game Over</h1>
        <p id="finalScore"></p>
        <input id="name" placeholder="Enter name">
        <button onclick="saveScore()">Save Score</button>
        <button onclick="restart()">Restart</button>
        <h3>🌍 Global Leaderboard</h3>
        <ol id="board"></ol>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcM93TLVcWsM3mndwLFMW3bQ7ay34q1pk",
  authDomain: "basket-blitz.firebaseapp.com",
  projectId: "basket-blitz",
  storageBucket: "basket-blitz.firebasestorage.app",
  messagingSenderId: "1061093319752",
  appId: "1:1061093319752:web:b901a2069becddaf9f247d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GAME ELEMENTS
const game = document.getElementById("game");
const basket = document.getElementById("basket");
const livesBoard = document.getElementById("lives");
const scoreBoard = document.getElementById("score");
const gameOverScreen = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");
const board = document.getElementById("board");

const goodSound = document.getElementById("goodSound");
const badSound = document.getElementById("badSound");

let basketX = 180;
let targetX = 180;
let lives = 5;
let score = 0;
let speed = 4;
let dead = false;

function updateHUD() {
    livesBoard.innerHTML = "❤️".repeat(lives);
    scoreBoard.innerHTML = "Score: " + score;
}

function animateBasket() {
    basketX += (targetX - basketX) * 0.18;

    if (basketX < 0) basketX = 0;
    if (basketX > game.clientWidth - 40)
        basketX = game.clientWidth - 40;

    basket.style.left = basketX + "px";

    requestAnimationFrame(animateBasket);
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") targetX -= 30;
    if (e.key === "ArrowRight") targetX += 30;
});

game.addEventListener("mousemove", e => {
    const r = game.getBoundingClientRect();
    targetX = e.clientX - r.left - 20;
});

game.addEventListener("touchmove", e => {
    const r = game.getBoundingClientRect();
    targetX = e.touches[0].clientX - r.left - 20;
});

function spawnBall() {
    if (dead) return;

    const ball = document.createElement("div");
    const green = Math.random() < 0.5;

    ball.className = "ball " + (green ? "green" : "red");
    ball.style.left = Math.random() * (game.clientWidth - 30) + "px";
    ball.style.top = "0px";

    game.appendChild(ball);

    fall(ball, green);
}

function fall(ball, green) {
    let y = 0;

    let id = setInterval(() => {

        if (dead) {
            clearInterval(id);
            ball.remove();
            return;
        }

        y += speed;
        ball.style.top = y + "px";

        let x = parseInt(ball.style.left);
        let basketY = game.clientHeight - 80;

        if (y > basketY && x > basketX - 30 && x < basketX + 40) {

            ball.remove();
            clearInterval(id);

            if (green) {
                score++;
                goodSound.currentTime = 0;
                goodSound.play();
            } else {
                lives--;
                badSound.currentTime = 0;
                badSound.play();
            }

            if (score % 5 === 0) speed += 0.5;

            updateHUD();
            checkGameOver();
        }

        if (y > game.clientHeight) {
            ball.remove();
            clearInterval(id);

            if (green) {
                lives--;
                badSound.currentTime = 0;
                badSound.play();
            }

            updateHUD();
            checkGameOver();
        }

    }, 30);
}

function checkGameOver() {
    if (lives <= 0) {
        dead = true;
        gameOverScreen.style.display = "flex";
        finalScore.innerText = "Score: " + score;
    }
}

window.saveScore = async function () {
    let name = document.getElementById("name").value || "Anon";

    await addDoc(collection(db, "leaderboard"), {
        name,
        score,
        time: Date.now()
    });
};

function loadBoardRealtime() {
    const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));

    onSnapshot(q, (snapshot) => {
        board.innerHTML = "";
        let rank = 1;

        snapshot.forEach(doc => {
            const d = doc.data();

            let medal = "";
            if (rank === 1) medal = "🥇 ";
            else if (rank === 2) medal = "🥈 ";
            else if (rank === 3) medal = "🥉 ";

            const li = document.createElement("li");
            li.textContent = medal + d.name + " - " + d.score;

            board.appendChild(li);
            rank++;
        });
    });
}

window.restart = function () {
    location.reload();
};

setInterval(spawnBall, 700);
updateHUD();
animateBasket();
loadBoardRealtime();

</script>

</body>
</html>
